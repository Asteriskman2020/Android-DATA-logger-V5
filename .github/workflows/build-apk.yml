name: Build Debug APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DataLoggerDownloader-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Get version name
        id: get_version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: "Data Logger Downloader ${{ steps.get_version.outputs.tag }}"
          body: |
            ## Data Logger Downloader v${{ steps.get_version.outputs.version }}

            ### Features
            - BLE connection to ESP32-C6 (Service UUID: ab000001-...)
            - Live sensor display: AHT20 temp/humidity + BMP280 temp/pressure
            - BLE data fetch from ESP32 buffer (READBUF command)
            - MQTT publish support (Paho client)
            - Two-tab layout: DATA + SETTINGS
            - SharedPreferences for persistent settings
            - Light red theme

            ### Install
            Download `app-debug.apk` and install on Android 6.0+ (API 23+).
          files: app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
